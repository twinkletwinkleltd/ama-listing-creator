name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e

            cd /opt/portal-system/apps/ama-listing-creator

            # Pull latest code from ama-listing-creator repo.
            sudo -u portal-system git fetch origin
            sudo -u portal-system git reset --hard origin/main

            # Backup current build outside the project tree (keep last 5).
            BACKUP_DIR=/opt/deploy-backups/ama-listing-creator
            sudo mkdir -p "$BACKUP_DIR"
            sudo chown portal-system:portal-system "$BACKUP_DIR"
            if [ -d .next/standalone ]; then
              SHA=$(sudo -u portal-system git rev-parse --short HEAD)
              sudo -u portal-system cp -r .next/standalone "$BACKUP_DIR/$SHA" 2>/dev/null || true
              sudo -u portal-system bash -c "ls -t \"$BACKUP_DIR\" 2>/dev/null | tail -n +6 | xargs -r -I{} rm -rf \"$BACKUP_DIR/{}\""
            fi

            # Install dependencies + build.
            sudo -u portal-system npm install --no-audit --no-fund
            sudo -u portal-system npm run build

            # Copy static assets into standalone bundle so CSS/JS chunks serve.
            # Without this, HTML loads but /_next/static/* returns 404.
            sudo -u portal-system mkdir -p .next/standalone/.next
            sudo -u portal-system cp -r .next/static .next/standalone/.next/static
            if [ -d public ]; then
              sudo -u portal-system cp -r public .next/standalone/public
            fi

            # Data directory is persistent at project root (AMA_LISTING_DATA_ROOT
            # env var in systemd unit points there). Do NOT copy data/ into the
            # standalone bundle — that would clobber live data on every deploy.

            # Refresh systemd unit from repo (in case it changed).
            sudo cp deploy/ama-listing.service /etc/systemd/system/ama-listing.service
            sudo systemctl daemon-reload
            sudo systemctl restart ama-listing.service

            # Health check — fail deploy if service did not come up.
            sleep 3
            sudo systemctl is-active ama-listing.service
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3002/apps/listing)
            echo "ama-listing HTTP: ${code}"
            echo "${code}" | grep -qE "^(200|302|307)$" || \
              { echo "ERROR: expected 200/302/307, got ${code}"; exit 1; }

            # Static asset health check — HTML 200 is not enough; verify a
            # referenced /_next/static/* asset actually loads, otherwise the
            # page renders as unstyled raw HTML.
            HTML_BODY=$(curl -s http://127.0.0.1:3002/apps/listing)
            ASSET=$(echo "$HTML_BODY" | grep -oE "/apps/listing/_next/static/[^\"]+\.(css|js)" | head -1)
            if [ -z "$ASSET" ]; then
              ASSET=$(echo "$HTML_BODY" | grep -oE "/_next/static/[^\"]+\.(css|js)" | head -1)
            fi
            if [ -n "$ASSET" ]; then
              ASSET_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3002${ASSET}")
              echo "ama-listing static asset ${ASSET}: ${ASSET_CODE}"
              [ "$ASSET_CODE" = "200" ] || \
                { echo "ERROR: static asset ${ASSET} returned ${ASSET_CODE}"; exit 1; }
            else
              echo "WARN: no /_next/static/* reference found in HTML — cannot verify static assets"
            fi
          '
